name: color_sort_master
description: "Application"
publish_to: 'none'

version: 1.2.0+8

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  games_services: ^5.0.0
  in_app_purchase: ^3.1.13
  cloud_firestore:
  firebase_auth:
  share_plus:
  app_links:

  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  confetti: ^0.8.0
  audioplayers: ^6.1.0
  shared_preferences: ^2.5.3
  firebase_core: ^4.10.0
  firebase_analytics: ^12.0.0
  firebase_crashlytics: ^5.2.3
  google_mobile_ads: ^6.0.0
  intl: any
  flame: ^1.30.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#2B0A5A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"



flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
    - assets/icon/
    - assets/store/
    - assets/levels/

